<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPROV BATTLE | TG CONNECTED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto+Mono:wght@300;700&display=swap');

        :root {
            --accent: #00f2ff;
            --main-pink: #ff007b;
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
        }

        #code-canvas {
            position: fixed; top: 0; left: 0;
            z-index: -1; opacity: 0.2;
        }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
            margin: 0;
        }

        .tagline {
            font-size: 1rem; letter-spacing: 5px;
            color: var(--main-pink); margin-bottom: 40px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px; border: 1px solid var(--accent);
            border-radius: 8px; backdrop-filter: blur(5px);
            width: 90%; max-width: 350px;
            display: flex; flex-direction: column; gap: 15px;
        }

        input {
            padding: 12px; background: #000;
            border: 1px solid var(--accent); color: #fff;
            font-family: 'Roboto Mono', monospace; outline: none;
        }

        .submit-btn {
            padding: 15px; background: var(--main-pink);
            border: none; color: white; font-weight: bold;
            font-family: 'Orbitron', sans-serif; cursor: pointer;
            transition: 0.3s; letter-spacing: 2px;
        }

        .submit-btn:hover {
            box-shadow: 0 0 20px var(--main-pink);
            transform: scale(1.02);
        }

        #status { margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<canvas id="code-canvas"></canvas>

<section class="hero">
    <h1>IMPROV BATTLE</h1>
    <div class="tagline">REGISTRATION OPEN</div>

    <div class="form-container">
        <input type="text" id="userName" placeholder="ИМЯ УЧАСТНИКА" autocomplete="off">
        <button class="submit-btn" id="sendBtn" onclick="sendToTelegram()">ОТПРАВИТЬ</button>
        <div id="status"></div>
    </div>
</section>

<script>
    // --- ДАННЫЕ ТЕЛЕГРАМ (ВСТАВЬ СВОИ) ---
    const botToken = "ТВОЙ_ТОКЕН_ОТ_BOTFATHER";
    const chatId = "ТВОЙ_CHAT_ID";

    async function sendToTelegram() {
        const name = document.getElementById('userName').value;
        const status = document.getElementById('status');
        const btn = document.getElementById('sendBtn');

        if (!name) {
            status.innerText = "Введи имя, боец!";
            status.style.color = "yellow";
            return;
        }

        btn.disabled = true;
        status.innerText = "Отправка данных в штаб...";
        status.style.color = "var(--accent)";

        const message = `🚀 НОВЫЙ ИГРОК НА БАТТЛ!\n\n👤 Имя: ${name}\n⏰ Время: ${new Date().toLocaleString()}`;
        const url = `https://api.telegram.org/bot${8616847116:AAGuvJG6jjoPXTuCQv4iH7zScUWy59tAOuk}/sendMessage?chat_id=${693493041}&text=${encodeURIComponent(message)}`;

        try {
            const response = await fetch(url);
            if (response.ok) {
                status.innerText = "Успешно! Ты в деле.";
                status.style.color = "#00ff00";
                document.getElementById('userName').value = "";
            } else {
                throw new Error();
            }
        } catch (error) {
            status.innerText = "Ошибка связи. Проверь токен.";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }

    // --- ФОН С ЯЗЫКАМИ ---
    const canvas = document.getElementById('code-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    const techs = ["JavaScript", "C++", "Rust", "Swift", "Go", "TypeScript", "React", "SQL", "Git", "API"];
    const drops = Array(Math.floor(canvas.width / 120)).fill(0);

    function draw() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = '14px "Roboto Mono"';

        drops.forEach((y, i) => {
            const text = techs[Math.floor(Math.random() * techs.length)];
            ctx.fillStyle = i % 2 === 0 ? '#00f2ff' : '#ff007b';
            ctx.fillText(text, i * 140, y * 14);
            if (y * 14 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
</script>

</body>
</html>
